<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Arabic Ninja - Letter Challenge 🥷</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        body { font-family: 'Cairo', sans-serif; color: #fff; user-select: none; -webkit-user-select: none; touch-action: none; }
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: block; z-index: 1; }

        /* Screens */
        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; transition: opacity 0.4s, transform 0.4s; }
        .screen.hidden { opacity: 0; pointer-events: none; transform: scale(1.1); display: none; }
        .screen.active { opacity: 1; pointer-events: auto; transform: scale(1); display: flex; }

        /* Menu Styling */
        #s-menu { background: url('https://www.transparenttextures.com/patterns/wood-pattern.png'), radial-gradient(circle, #3e2723 0%, #1a0f05 100%); gap: 2.5rem; }
        .logo { font-family: 'Amiri', serif; font-size: clamp(3.5rem, 12vw, 7rem); font-weight: 700; color: #FFD700; text-shadow: 0 0 40px rgba(255, 215, 0, 0.6), 4px 4px 0px #3e2723; text-align: center; line-height: 1; }
        .ninja-icon { font-size: 7rem; animation: float 4s ease-in-out infinite; filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.5)); }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-3deg); }
            50% { transform: translateY(-30px) rotate(3deg); }
        }

        /* Buttons */
        .btn-gold { 
            background: linear-gradient(135deg, #fbc02d, #fff176, #fbc02d); 
            border: none; color: #3d2b1f; font-size: 1.8rem; font-weight: 900; 
            padding: 1.2rem 4rem; border-radius: 60px; cursor: pointer; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4), inset 0 2px 10px rgba(255,255,255,0.8);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-gold:hover { transform: scale(1.1); box-shadow: 0 20px 45px rgba(255, 215, 0, 0.5); }
        .btn-gold:active { transform: scale(0.95); }

        .btn-ghost { 
            background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255, 255, 255, 0.3);
            color: #fff; padding: 1rem 2.5rem; border-radius: 40px; cursor: pointer; font-weight: 700;
            transition: background 0.3s; font-size: 1.2rem;
        }
        .btn-ghost:hover { background: rgba(255, 255, 255, 0.2); }

        /* HUD */
        #hud { 
            position: fixed; top: 0; left: 0; right: 0; padding: 2rem; 
            display: flex; justify-content: space-between; align-items: center; z-index: 20; 
            pointer-events: none; background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
        }
        .hearts { display: flex; gap: 0.8rem; pointer-events: auto; }
        .heart { font-size: 3rem; filter: drop-shadow(0 0 15px red); transition: transform 0.4s, opacity 0.4s; }
        .heart.lost { opacity: 0.1; transform: scale(0.7) rotate(-20deg); filter: grayscale(1); }
        .progress-val { font-size: 2.5rem; font-weight: 900; color: #FFD700; text-shadow: 0 0 10px rgba(0,0,0,0.8); }

        /* Feedback */
        #flash { position: fixed; inset: 0; background: rgba(255,0,0,0.4); opacity: 0; pointer-events: none; transition: opacity 0.1s; z-index: 5; }
        #instruction { 
            position: fixed; bottom: 20%; left: 0; right: 0; text-align: center; 
            font-size: 2rem; color: #FFD700; text-shadow: 0 4px 15px rgba(0,0,0,0.9);
            z-index: 15; pointer-events: none; opacity: 0; transition: opacity 0.5s; font-weight: 900;
        }
        #instruction.show { opacity: 1; }

        /* Results Box */
        .result-box { background: rgba(26, 15, 5, 0.95); border: 6px solid #FFD700; border-radius: 40px; padding: 4rem; text-align: center; box-shadow: 0 0 80px rgba(0,0,0,1); }
        .result-title { font-size: 4rem; margin-bottom: 1.5rem; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    <div id="flash"></div>
    <div id="instruction"></div>

    <!-- Screen: Menu -->
    <div id="s-menu" class="screen active">
        <div class="ninja-icon">🥷</div>
        <h1 class="logo">Arabic Ninja</h1>
        <button class="btn-gold" id="btn-play">🚀 Let's Go!</button>
    </div>

    <!-- Screen: Mode Selection -->
    <div id="s-mode" class="screen hidden">
        <h2 style="font-size: 3rem; margin-bottom: 2rem; text-shadow: 0 4px 10px #000;">Choose Your Battle</h2>
        <div style="display: flex; gap: 3rem; flex-wrap: wrap; justify-content: center;">
            <button class="btn-gold" id="mode-ortho" style="width: 300px;">🍎 Similar Shapes</button>
            <button class="btn-gold" id="mode-phone" style="width: 300px;">🍊 Similar Sounds</button>
        </div>
        <button class="btn-ghost" style="margin-top: 3rem;" id="btn-back-menu">← Back</button>
    </div>

    <!-- Screen: Game Over -->
    <div id="s-over" class="screen hidden">
        <div class="result-box">
            <div class="result-title" style="color: #ff4444;">Game Over! ⚔️</div>
            <div style="font-size: 2rem; margin-bottom: 2rem;">You scored <span id="over-correct" style="color: #FFD700; font-weight: 900;">0</span> points</div>
            <div style="display: flex; gap: 1.5rem; justify-content: center;">
                <button class="btn-gold" id="btn-retry">Try Again</button>
                <button class="btn-ghost" id="btn-menu-over">Main Menu</button>
            </div>
        </div>
    </div>

    <!-- Screen: Victory -->
    <div id="s-win" class="screen hidden">
        <div class="result-box">
            <div class="result-title" style="color: #FFD700;">Ninja Master! 👑</div>
            <p style="font-size: 2.2rem; margin-bottom: 2rem;">You mastered all challenges!</p>
            <div style="display: flex; gap: 1.5rem; justify-content: center;">
                <button class="btn-gold" id="btn-replay">Play Again</button>
                <button class="btn-ghost" id="btn-menu-win">Main Menu</button>
            </div>
        </div>
    </div>

    <!-- HUD -->
    <div id="hud" style="display: none;">
        <div class="hearts">
            <span class="heart" id="h1">❤️</span>
            <span class="heart" id="h2">❤️</span>
            <span class="heart" id="h3">❤️</span>
        </div>
        <div class="progress-val"><span id="curr-val">0</span> / <span id="total-val">0</span></div>
        <button class="btn-ghost" id="btn-exit-game" style="pointer-events: auto;">❌ Stop</button>
    </div>

    <script>
        const VOCAL_PATH = "D:/lighknight/abcVocals/";
        const MENU_SONG_PATH = VOCAL_PATH + "abc song.mp3";

        // Sound Mapping
        const SOUNDS = {
            'أ': 'ءا.m4a', 'ب': 'ب.m4a', 'ت': 'تا.m4a', 'ث': 'ثا.m4a', 'ج': 'جا.m4a', 
            'ح': 'حا.m4a', 'خ': 'خا.m4a', 'د': 'دا.m4a', 'ذ': 'ذا.m4a', 'ر': 'را.m4a', 
            'ز': 'زا.m4a', 'س': 'س.m4a', 'ش': 'شا.m4a', 'ص': 'صا.m4a', 'ض': 'ضا.m4a', 
            'ط': 'طا.m4a', 'ظ': 'ظا.m4a', 'ع': 'عا.m4a', 'غ': 'غا.m4a', 'ف': 'فا.m4a', 
            'ق': 'ققا.m4a', 'ك': 'كا.m4a', 'ل': 'لا.m4a', 'م': 'ما.m4a', 'ن': 'نا.m4a', 
            'ه': 'ها.m4a', 'و': 'وا.m4a', 'ي': 'ي.m4a', 'ة': 'تا.m4a', 'ء': 'ءا.m4a', 
            'ئ': 'ءي.m4a', 'بـ': 'ب.m4a', 'تـ': 'تا.m4a', 'ثـ': 'ثا.m4a', 'يـ': 'ي.m4a',
            'نـ': 'نا.m4a', 'ئـ': 'ءي.m4a', 'عــ': 'عا.m4a', 'غــ': 'غا.m4a', 'ــعــ': 'عا.m4a',
            'ــغــ': 'غا.m4a', 'ــع': 'عا.m4a', 'ــغ': 'غا.m4a', 'فــ': 'فا.m4a', 'قــ': 'ققا.m4a',
            'ــفــ': 'فا.m4a', 'ــقــ': 'ققا.m4a', 'ـق': 'ققا.m4a', 'ـة': 'تا.m4a', 'ـه': 'ها.m4a',
            'ـلـ': 'لا.m4a', 'ـا': 'ءا.m4a', 'ــمـ': 'ما.m4a', 'ــهــ': 'ها.m4a'
        };

        const GROUPS_ORTHO = [
            { items: ['بـ', 'تـ', 'ثـ', 'يـ', 'نـ', 'ئـ'] },
            { items: ['ج', 'ح', 'خ'] },
            { items: ['د', 'ذ'] },
            { items: ['ر', 'ز'] },
            { items: ['س', 'ش'] },
            { items: ['ص', 'ض'] },
            { items: ['ط', 'ظ'] },
            { items: ['ع', 'غ'] },
            { items: ['ــعــ', 'ــغــ'] },
            { items: ['ــع', 'ــغ'] },
            { items: ['ف', 'ق'] },
            { items: ['ــفــ', 'ــقــ'] },
            { items: ['ـق', 'ـة'] },
            { items: ['ـه', 'ـة'] },
            { items: ['ـلـ', 'ـا'] },
            { items: ['د', 'ذ', 'ر', 'ز'] },
            { items: ['عــ', 'ء'] },
            { items: ['ــمـ', 'ــهــ'] }
        ];

        const GROUPS_PHONE = [
            { items: ['ت', 'ط'] },
            { items: ['س', 'ص'] },
            { items: ['ع', 'ء'] },
            { items: ['د', 'ض'] },
            { items: ['ظ', 'ذ'] },
            { items: ['ك', 'ج'] },
            { items: ['ث', 'ذ'] },
            { items: ['م', 'ن'] }
        ];

        const FRUIT_COLORS = [
            { body: '#e53935', light: '#ff8a80', dark: '#b71c1c' }, // Red (Apple)
            { body: '#fb8c00', light: '#ffb74d', dark: '#e65100' }, // Orange
            { body: '#43a047', light: '#81c784', dark: '#1b5e20' }, // Watermelon
            { body: '#fdd835', light: '#fff176', dark: '#fbc02d' }, // Lemon
            { body: '#8e24aa', light: '#ba68c8', dark: '#4a148c' }  // Grapes
        ];

        // Global Audio Context
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSliceSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        // Canvas Setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        // Game Core
        let gameState = 'menu';
        let currentMode = 'ortho';
        let challenges = [];
        let currentChallengeIndex = 0;
        let lives = 3;
        let fruits = [];
        let particles = [];
        let trails = [];
        let splitFruits = [];
        let score = 0;
        let isDrawing = false;
        let lastPos = null;
        let menuMusic = new Audio(MENU_SONG_PATH);
        menuMusic.loop = true;

        class Fruit {
            constructor(text, x, y, vx, vy, colors) {
                this.text = text;
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.colors = colors;
                this.radius = Math.min(width, height) * 0.08;
                this.rotation = Math.random() * Math.PI * 2;
                this.vRotation = (Math.random() - 0.5) * 0.06;
                this.isTarget = false;
                this.sliced = false;
                this.gravity = 0.28; // Balanced gravity
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.rotation += this.vRotation;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(0, this.radius * 0.2, this.radius, this.radius * 0.9, 0, 0, Math.PI * 2);
                ctx.fill();

                // Body Gradient
                const grad = ctx.createRadialGradient(-this.radius * 0.3, -this.radius * 0.3, 0, 0, 0, this.radius);
                grad.addColorStop(0, this.colors.light);
                grad.addColorStop(0.7, this.colors.body);
                grad.addColorStop(1, this.colors.dark);
                
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fill();

                // Leaf
                ctx.fillStyle = '#4CAF50';
                ctx.beginPath();
                ctx.ellipse(0, -this.radius * 0.9, this.radius * 0.2, this.radius * 0.4, 0.4, 0, Math.PI * 2);
                ctx.fill();

                // Letter
                ctx.fillStyle = '#fff';
                ctx.font = `bold ${this.radius * 0.9}px 'Amiri', serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 10;
                ctx.fillText(this.text, 0, 0);

                ctx.restore();
            }
        }

        class SplitFruit {
            constructor(text, x, y, vx, vy, rotation, colors, side) {
                this.text = text; this.x = x; this.y = y; this.vx = vx; this.vy = vy;
                this.rotation = rotation; this.colors = colors; this.side = side;
                this.vRotation = (Math.random() - 0.5) * 0.2;
                this.radius = Math.min(width, height) * 0.08;
                this.alpha = 1;
            }
            update() {
                this.x += this.vx; this.y += this.vy; this.vy += 0.3;
                this.rotation += this.vRotation; this.alpha -= 0.02;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                ctx.beginPath();
                if (this.side === -1) ctx.rect(-this.radius, -this.radius, this.radius, this.radius * 2);
                else ctx.rect(0, -this.radius, this.radius, this.radius * 2);
                ctx.clip();

                ctx.fillStyle = this.colors.body;
                ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI * 2); ctx.fill();
                
                ctx.fillStyle = '#fff';
                ctx.font = `bold ${this.radius * 0.9}px 'Amiri', serif`;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(this.text, 0, 0);
                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                const ang = Math.random() * Math.PI * 2;
                const spd = Math.random() * 10 + 2;
                this.vx = Math.cos(ang) * spd;
                this.vy = Math.sin(ang) * spd;
                this.size = Math.random() * 8 + 4;
                this.alpha = 1;
            }
            update() { this.x += this.vx; this.y += this.vy; this.vy += 0.2; this.alpha -= 0.03; }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size); ctx.restore();
            }
        }

        function initChallenges(mode) {
            const groups = mode === 'ortho' ? GROUPS_ORTHO : GROUPS_PHONE;
            challenges = [];
            groups.forEach(g => {
                const items = g.items;
                // Create all permutations of pairs within each group
                for (let i = 0; i < items.length; i++) {
                    for (let j = 0; j < items.length; j++) {
                        if (i === j) continue;
                        challenges.push({ target: items[i], distractor: items[j] });
                    }
                }
            });
            // Shuffle them
            challenges.sort(() => Math.random() - 0.5);
            currentChallengeIndex = 0;
        }

        async function spawnWave() {
            if (gameState !== 'playing') return;
            if (currentChallengeIndex >= challenges.length) { winGame(); return; }

            const ch = challenges[currentChallengeIndex];
            
            // 1. Play Sound FIRST
            const fileName = SOUNDS[ch.target] || (ch.target + '.m4a');
            const audio = new Audio(VOCAL_PATH + fileName);
            await audio.play().catch(e => console.error(e));

            // 2. Wait 1 Second before launching
            setTimeout(() => {
                if (gameState !== 'playing') return;
                
                fruits = [];
                const isTargetLeft = Math.random() > 0.5;
                
                const createFruit = (text, isLeft) => {
                    const x = isLeft ? width * 0.25 : width * 0.75;
                    const vx = (isLeft ? 1.2 : -1.2) + (Math.random() - 0.5);
                    const vy = -(height * 0.022 + Math.random() * 3); // Balanced height
                    const colorSet = FRUIT_COLORS[Math.floor(Math.random() * FRUIT_COLORS.length)];
                    return new Fruit(text, x, height + 100, vx, vy, colorSet);
                };

                const f1 = createFruit(ch.target, isTargetLeft); f1.isTarget = true;
                const f2 = createFruit(ch.distractor, !isTargetLeft);
                fruits.push(f1, f2);
            }, 1000);
        }

        function sliceFruit(fruit) {
            if (fruit.sliced) return;
            fruit.sliced = true;
            playSliceSound();
            
            splitFruits.push(new SplitFruit(fruit.text, fruit.x, fruit.y, fruit.vx - 3, fruit.vy, fruit.rotation, fruit.colors, -1));
            splitFruits.push(new SplitFruit(fruit.text, fruit.x, fruit.y, fruit.vx + 3, fruit.vy, fruit.rotation, fruit.colors, 1));
            for (let i = 0; i < 20; i++) particles.push(new Particle(fruit.x, fruit.y, fruit.colors.body));

            if (fruit.isTarget) {
                score++; currentChallengeIndex++;
                updateHUD();
                setTimeout(spawnWave, 1200);
            } else {
                loseLife();
            }
        }

        function loseLife() {
            lives--;
            updateHUD();
            document.getElementById('flash').style.opacity = 1;
            setTimeout(() => document.getElementById('flash').style.opacity = 0, 100);
            
            if (lives <= 0) {
                gameOver();
            } else {
                // If they hit the wrong one, we just go to the next wave after a delay
                currentChallengeIndex++; 
                updateHUD();
                setTimeout(spawnWave, 1500);
            }
        }

        function updateHUD() {
            document.getElementById('curr-val').textContent = currentChallengeIndex;
            document.getElementById('total-val').textContent = challenges.length;
            for (let i = 1; i <= 3; i++) {
                const h = document.getElementById('h' + i);
                if (i > lives) h.classList.add('lost');
                else h.classList.remove('lost');
            }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => {
                s.classList.remove('active');
                s.classList.add('hidden');
            });
            const el = document.getElementById(id);
            if(el) {
                el.classList.remove('hidden');
                el.classList.add('active');
            }
        }

        function startGame(mode) {
            gameState = 'playing'; currentMode = mode; lives = 3; score = 0;
            fruits = []; particles = []; splitFruits = [];
            initChallenges(mode); updateHUD();
            showScreen('hud'); document.getElementById('hud').style.display = 'flex';
            menuMusic.pause(); menuMusic.currentTime = 0;
            spawnWave();
        }

        function gameOver() {
            gameState = 'over'; document.getElementById('hud').style.display = 'none';
            document.getElementById('over-correct').textContent = score;
            showScreen('s-over'); menuMusic.play();
        }

        function winGame() {
            gameState = 'win'; document.getElementById('hud').style.display = 'none';
            showScreen('s-win'); menuMusic.play();
        }

        // Input
        function checkSlice(p1, p2) {
            fruits.forEach(f => {
                if (f.sliced) return;
                const dist = distToSegment({x: f.x, y: f.y}, p1, p2);
                if (dist < f.radius * 1.2) sliceFruit(f);
            });
        }
        function distToSegment(p, v, w) {
            const l2 = Math.pow(v.x - w.x, 2) + Math.pow(v.y - w.y, 2);
            if (l2 === 0) return Math.sqrt(Math.pow(p.x - v.x, 2) + Math.pow(p.y - v.y, 2));
            let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
            t = Math.max(0, Math.min(1, t));
            return Math.sqrt(Math.pow(p.x - (v.x + t * (w.x - v.x)), 2) + Math.pow(p.y - (v.y + t * (w.y - v.y)), 2));
        }

        canvas.onmousedown = e => { isDrawing = true; lastPos = {x: e.clientX, y: e.clientY}; trails = [lastPos]; };
        window.onmousemove = e => {
            if (!isDrawing || gameState !== 'playing') return;
            const cur = {x: e.clientX, y: e.clientY};
            checkSlice(lastPos, cur); lastPos = cur;
            trails.push(cur); if (trails.length > 15) trails.shift();
        };
        window.onmouseup = () => { isDrawing = false; trails = []; };

        canvas.ontouchstart = e => { const t = e.touches[0]; isDrawing = true; lastPos = {x: t.clientX, y: t.clientY}; trails = [lastPos]; };
        canvas.ontouchmove = e => {
            if (!isDrawing || gameState !== 'playing') return;
            const t = e.touches[0]; const cur = {x: t.clientX, y: t.clientY};
            checkSlice(lastPos, cur); lastPos = cur;
            trails.push(cur); if (trails.length > 15) trails.shift();
            e.preventDefault();
        };
        canvas.ontouchend = () => { isDrawing = false; trails = []; };

        // UI
        document.getElementById('btn-play').onclick = () => { showScreen('s-mode'); menuMusic.play().catch(()=>{}); };
        document.getElementById('btn-back-menu').onclick = () => showScreen('s-menu');
        document.getElementById('mode-ortho').onclick = () => startGame('ortho');
        document.getElementById('mode-phone').onclick = () => startGame('phone');
        document.getElementById('btn-retry').onclick = () => startGame(currentMode);
        document.getElementById('btn-replay').onclick = () => startGame(currentMode);
        document.getElementById('btn-menu-over').onclick = () => showScreen('s-menu');
        document.getElementById('btn-menu-win').onclick = () => showScreen('s-menu');
        document.getElementById('btn-exit-game').onclick = () => { gameState='menu'; showScreen('s-menu'); document.getElementById('hud').style.display='none'; menuMusic.play(); };

        function loop() {
            // Background
            ctx.fillStyle = '#1a0f05'; ctx.fillRect(0, 0, width, height);
            ctx.strokeStyle = 'rgba(255,255,255,0.02)';
            for(let i=0; i<width; i+=40) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, height); ctx.stroke(); }

            if (gameState === 'playing' || gameState === 'over' || gameState === 'win') {
                fruits.forEach((f, i) => {
                    f.update(); f.draw();
                    if (f.y > height + 200 && !f.sliced) {
                        fruits.splice(i, 1);
                        // If they miss the target, they lose a life
                        if (f.isTarget) {
                            loseLife();
                        }
                    }
                });
                particles.forEach((p, i) => { p.update(); p.draw(); if (p.alpha <= 0) particles.splice(i, 1); });
                splitFruits.forEach((s, i) => { s.update(); s.draw(); if (s.alpha <= 0 || s.y > height + 200) splitFruits.splice(i, 1); });
                if (trails.length > 1) {
                    ctx.beginPath(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 10; ctx.lineCap = 'round';
                    ctx.shadowColor = '#fff'; ctx.shadowBlur = 20;
                    trails.forEach((t, i) => { if (i === 0) ctx.moveTo(t.x, t.y); else ctx.lineTo(t.x, t.y); });
                    ctx.stroke(); ctx.shadowBlur = 0;
                }
            }
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
