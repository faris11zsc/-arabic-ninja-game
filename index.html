<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Arabic Ninja - Final Mastery 🥷</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        body { font-family: 'Cairo', sans-serif; color: #fff; user-select: none; -webkit-user-select: none; touch-action: none; }
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: block; z-index: 1; }
        
        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; transition: 0.4s; }
        .screen.hidden { opacity: 0; pointer-events: none; display: none; }
        .screen.active { opacity: 1; pointer-events: auto; display: flex; }
        
        #s-menu { background: radial-gradient(circle at center, #1e1e1e 0%, #000 100%); gap: 2rem; }
        .logo { font-family: 'Amiri', serif; font-size: clamp(3.5rem, 12vw, 7rem); font-weight: 700; color: #FFD700; text-shadow: 0 0 30px rgba(255, 215, 0, 0.4); text-align: center; }
        .ninja-icon { font-size: 6rem; animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        
        .btn-gold { background: linear-gradient(135deg, #FFD700, #FFF9C4, #FFD700); border: none; color: #000; font-size: 1.5rem; font-weight: 900; padding: 1.2rem 4rem; border-radius: 50px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .btn-gold:hover { transform: scale(1.05); }
        .btn-ghost { background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.2); color: #fff; padding: 1rem 2rem; border-radius: 30px; cursor: pointer; }
        
        #hud { position: fixed; top: 0; left: 0; right: 0; padding: 1.5rem; display: flex; justify-content: space-between; align-items: center; z-index: 20; pointer-events: none; }
        .heart { font-size: 3rem; transition: 0.3s; }
        .heart.lost { opacity: 0.1; filter: grayscale(1); }
        
        #flash { position: fixed; inset: 0; background: rgba(255,0,0,0.3); opacity: 0; pointer-events: none; z-index: 5; }
        .result-box { background: #111; border: 4px solid #FFD700; border-radius: 40px; padding: 4rem; text-align: center; }
        
        /* UNLOCK OVERLAY FOR MOBILE */
        #s-unlock { background: #000; z-index: 100; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    <div id="flash"></div>

    <!-- INITIAL UNLOCK SCREEN (CRITICAL FOR MOBILE) -->
    <div id="s-unlock" class="screen active">
        <div class="ninja-icon">🥷</div>
        <h1 class="logo">Arabic Ninja</h1>
        <p style="margin-bottom: 2rem; opacity: 0.7;">Click to enable sound and start</p>
        <button class="btn-gold" id="btn-unlock">ENTER DOJO</button>
    </div>

    <!-- MENU -->
    <div id="s-menu" class="screen hidden">
        <h1 class="logo">Arabic Ninja</h1>
        <button class="btn-gold" id="btn-play">▶ Play Mission</button>
    </div>

    <!-- MODES -->
    <div id="s-mode" class="screen hidden">
        <h2 style="font-size: 2.5rem; margin-bottom: 2rem;">Select Battle</h2>
        <div style="display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center;">
            <button class="btn-gold" id="mode-ortho" style="min-width: 280px;">Similar Shapes</button>
            <button class="btn-gold" id="mode-phone" style="min-width: 280px;">Similar Sounds</button>
        </div>
        <button class="btn-ghost" style="margin-top: 3rem;" id="btn-back-menu">← Back</button>
    </div>

    <!-- HUD -->
    <div id="hud" style="display: none;">
        <div style="display: flex; gap: 0.5rem; pointer-events: auto;">
            <span class="heart" id="h1">❤️</span>
            <span class="heart" id="h2">❤️</span>
            <span class="heart" id="h3">❤️</span>
        </div>
        <div style="font-size: 2.5rem; font-weight: 900; color: #FFD700;" id="progress-text">0 / 0</div>
        <button class="btn-ghost" id="btn-exit" style="pointer-events: auto;">❌ Quit</button>
    </div>

    <!-- RESULTS -->
    <div id="s-over" class="screen hidden">
        <div class="result-box">
            <h2 style="font-size: 3rem; color: #ff4444; margin-bottom: 1rem;">DEFEAT ⚔️</h2>
            <button class="btn-gold" id="btn-retry">Retry</button>
        </div>
    </div>
    <div id="s-win" class="screen hidden">
        <div class="result-box">
            <h2 style="font-size: 3rem; color: #FFD700; margin-bottom: 1rem;">VICTORY 🏆</h2>
            <button class="btn-gold" id="btn-replay">Play Again</button>
        </div>
    </div>

    <script>
        // --- ASSET CONFIGURATION ---
        const ROOT = "abcVocals/";
        const TRIM = ROOT + "trimmed/";
        
        // Helper to handle spaces and Arabic characters
        const encode = (p) => encodeURI(p);

        const SOUNDS_LIB = {
            'bg': encode(ROOT + "abc song.mp3"),
            'slice': encode(ROOT + "666herohero-slash-21834.mp3"),
            // Main Alphabet
            'أ': encode(ROOT + 'ءا.m4a'), 'ب': encode(ROOT + 'ب.m4a'), 'ت': encode(ROOT + 'تا.m4a'), 'ث': encode(ROOT + 'ثا.m4a'),
            'ج': encode(ROOT + 'جا.m4a'), 'ح': encode(ROOT + 'حا.m4a'), 'خ': encode(ROOT + 'خا.m4a'), 'د': encode(ROOT + 'دا.m4a'),
            'ذ': encode(ROOT + 'ذا.m4a'), 'ر': encode(ROOT + 'را.m4a'), 'ز': encode(ROOT + 'زا.m4a'), 'س': encode(ROOT + 'س.m4a'),
            'ش': encode(ROOT + 'شا.m4a'), 'ص': encode(ROOT + 'صا.m4a'), 'ض': encode(ROOT + 'ضا.m4a'), 'ط': encode(ROOT + 'طا.m4a'),
            'ظ': encode(ROOT + 'ظا.m4a'), 'ع': encode(ROOT + 'عا.m4a'), 'غ': encode(ROOT + 'غا.m4a'), 'ف': encode(TRIM + 'فا.m4a'),
            'ق': encode(ROOT + 'ققا.m4a'), 'ك': encode(ROOT + 'كا.m4a'), 'ل': encode(TRIM + 'لَ.m4a'), 'م': encode(ROOT + 'ما.m4a'),
            'ن': encode(ROOT + 'نا.m4a'), 'ه': encode(ROOT + 'ها.m4a'), 'و': encode(ROOT + 'وا.m4a'), 'ي': encode(ROOT + 'ي.m4a'),
            'ة': encode(ROOT + 'تا.m4a'), 'ء': encode(ROOT + 'ءا.m4a'), 'ئ': encode(ROOT + 'ءي.m4a'),
            // Variations
            'بـ': encode(ROOT + 'ب.m4a'), 'تـ': encode(ROOT + 'تا.m4a'), 'ثـ': encode(ROOT + 'ثا.m4a'), 'يـ': encode(ROOT + 'ي.m4a'),
            'نـ': encode(ROOT + 'نا.m4a'), 'ئـ': encode(ROOT + 'ءي.m4a'), 'عــ': encode(ROOT + 'عا.m4a'), 'غــ': encode(ROOT + 'غا.m4a'),
            'ــعــ': encode(ROOT + 'عا.m4a'), 'ــغــ': encode(ROOT + 'غا.m4a'), 'ــع': encode(ROOT + 'عا.m4a'), 'ــغ': encode(ROOT + 'غا.m4a'),
            'فـ': encode(TRIM + 'فا.m4a'), 'قـ': encode(ROOT + 'ققا.m4a'), 'فــ': encode(TRIM + 'فا.m4a'), 'قــ': encode(ROOT + 'ققا.m4a'),
            'ــفــ': encode(TRIM + 'فا.m4a'), 'ــقــ': encode(ROOT + 'ققا.m4a'), 'ـفـ': encode(TRIM + 'فا.m4a'), 'ـقـ': encode(ROOT + 'ققا.m4a'),
            'ـق': encode(ROOT + 'ققا.m4a'), 'ـة': encode(ROOT + 'تا.m4a'), 'ـه': encode(ROOT + 'ها.m4a'), 'ـلـ': encode(TRIM + 'لَ.m4a'),
            'ـا': encode(TRIM + 'Alif.m4a'), 'ــمـ': encode(ROOT + 'ما.m4a'), 'ــهــ': encode(ROOT + 'ها.m4a' )
        };

        const GROUPS_ORTHO = [
            { items: ['بـ', 'تـ', 'ثـ', 'يـ', 'نـ', 'ئـ'] }, { items: ['ج', 'ح', 'خ'] }, { items: ['د', 'ذ'] }, { items: ['ر', 'ز'] }, { items: ['س', 'ش'] }, { items: ['ص', 'ض'] }, { items: ['ط', 'ظ'] }, { items: ['ع', 'غ'] }, { items: ['ــعــ', 'ــغــ'] }, { items: ['ــع', 'ــغ'] }, { items: ['ف', 'ق'] }, { items: ['ــفــ', 'ــقــ'] }, { items: ['ـق', 'ـة'] }, { items: ['ـه', 'ـة'] }, { items: ['ـلـ', 'ـا'] }, { items: ['د', 'ذ', 'ر', 'ز'] }, { items: ['عــ', 'ء'] }, { items: ['ــمـ', 'ــهــ'] }
        ];

        const GROUPS_PHONE = [
            { items: ['ت', 'ط'] }, { items: ['س', 'ص'] }, { items: ['ع', 'ء'] }, { items: ['د', 'ض'] }, { items: ['ظ', 'ذ'] }, { items: ['ك', 'ج'] }, { items: ['ث', 'ذ'] }, { items: ['م', 'ن'] }
        ];

        const PALETTE = ["#F3E5F5", "#E1F5FE", "#E8F5E9", "#FFF9C4", "#F1DDCF"];

        // --- CORE ENGINE ---
        const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
        let width, height, gameState = 'unlock', currentMode = 'ortho', challenges = [], currentChallengeIndex = 0, lives = 3, fruits = [], particles = [], trails = [], splitFruits = [], splashes = [], score = 0, isDrawing = false, lastPos = null;
        
        let bgMusic = null, sliceSfx = null, voiceAudio = new Audio();

        function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
        window.addEventListener('resize', resize); resize();

        // AUDIO UNLOCKER
        function handleFirstInteraction() {
            if (gameState !== 'unlock') return;
            // Initialize Audio
            bgMusic = new Audio(SOUNDS_LIB['bg']); bgMusic.loop = true;
            sliceSfx = new Audio(SOUNDS_LIB['slice']);
            
            // "Prime" all elements
            [bgMusic, sliceSfx, voiceAudio].forEach(a => {
                a.play().then(() => a.pause()).catch(() => {});
            });
            
            gameState = 'menu';
            showScreen('s-menu');
            bgMusic.play().catch(() => {});
        }

        document.getElementById('btn-unlock').onclick = handleFirstInteraction;

        async function playLetterSound(key) {
            const path = SOUNDS_LIB[key];
            if (!path) return;
            voiceAudio.src = path;
            return voiceAudio.play().catch(e => console.error("Sound Fail:", path));
        }

        class Fruit {
            constructor(text, x, y, vx, vy, color) {
                this.text = text; this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.color = color;
                this.radius = Math.min(width, height) * 0.12; this.rotation = (Math.random() - 0.5) * 0.5; this.vRotation = (Math.random() - 0.5) * 0.04;
                this.isTarget = false; this.sliced = false; this.gravity = 0.22;
            }
            update() { this.x += this.vx; this.y += this.vy; this.vy += this.gravity; this.rotation += this.vRotation; if (Math.abs(this.rotation) > 0.8) this.vRotation *= -1; }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.rotation);
                const grad = ctx.createRadialGradient(-this.radius * 0.3, -this.radius * 0.3, 0, 0, 0, this.radius);
                grad.addColorStop(0, '#fff'); grad.addColorStop(0.2, this.color); grad.addColorStop(1, this.color);
                ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#000'; ctx.font = `bold ${this.radius * 1.1}px 'Amiri', serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 2; ctx.strokeText(this.text, 0, 0); ctx.fillText(this.text, 0, 0); ctx.restore();
            }
        }

        class SplitFruit {
            constructor(text, x, y, vx, vy, rotation, color, side) {
                this.text = text; this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.rotation = rotation; this.color = color; this.side = side;
                this.radius = Math.min(width, height) * 0.12; this.alpha = 1;
            }
            update() { this.x += this.vx; this.y += this.vy; this.vy += 0.3; this.alpha -= 0.02; }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha; ctx.translate(this.x, this.y); ctx.rotate(this.rotation);
                ctx.beginPath(); if (this.side === -1) ctx.rect(-this.radius, -this.radius, this.radius, this.radius * 2); else ctx.rect(0, -this.radius, this.radius, this.radius * 2); ctx.clip();
                ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#000'; ctx.font = `bold ${this.radius * 1.1}px 'Amiri', serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(this.text, 0, 0); ctx.restore();
            }
        }

        function initChallenges(mode) {
            const groups = mode === 'ortho' ? GROUPS_ORTHO : GROUPS_PHONE;
            challenges = [];
            groups.forEach(g => {
                const items = g.items;
                for (let i = 0; i < items.length; i++) {
                    for (let j = 0; j < items.length; j++) { if (i === j) continue; challenges.push({ target: items[i], distractor: items[j] }); }
                }
            });
            challenges.sort(() => Math.random() - 0.5);
            currentChallengeIndex = 0;
        }

        async function spawnWave() {
            if (gameState !== 'playing') return;
            if (currentChallengeIndex >= challenges.length) { showScreen('s-win'); return; }
            const ch = challenges[currentChallengeIndex];
            
            // Sound-First
            await playLetterSound(ch.target);

            setTimeout(() => {
                if (gameState !== 'playing') return;
                fruits = [];
                let c1Idx = Math.floor(Math.random() * PALETTE.length), c2Idx = (c1Idx + 1) % PALETTE.length;
                const isL = Math.random() > 0.5;
                const create = (txt, isL, col) => {
                    const x = isL ? width * 0.25 : width * 0.75, vx = isL ? 1 : -1, vy = -(height * 0.026 + Math.random() * 4);
                    return new Fruit(txt, x, height + 150, vx, vy, col);
                }
                const f1 = create(ch.target, isL, PALETTE[c1Idx]); f1.isTarget = true;
                const f2 = create(ch.distractor, !isL, PALETTE[c2Idx]);
                fruits.push(f1, f2);
            }, 1000);
        }

        function sliceFruit(f) {
            if (f.sliced) return; f.sliced = true;
            if (sliceSfx) { sliceSfx.currentTime = 0; sliceSfx.play().catch(()=>{}); }
            splitFruits.push(new SplitFruit(f.text, f.x, f.y, f.vx-2, f.vy, f.rotation, f.color, -1));
            splitFruits.push(new SplitFruit(f.text, f.x, f.y, f.vx+2, f.vy, f.rotation, f.color, 1));
            if (f.isTarget) { score++; currentChallengeIndex++; updateHUD(); setTimeout(spawnWave, 1200); } else { loseLife(); }
        }

        function loseLife() {
            lives--; updateHUD();
            document.getElementById('flash').style.opacity = 1; setTimeout(() => document.getElementById('flash').style.opacity = 0, 100);
            if (lives <= 0) { gameState = 'over'; showScreen('s-over'); }
            else { setTimeout(() => { if (gameState === 'playing') { currentChallengeIndex++; updateHUD(); spawnWave(); } }, 1000); }
        }

        function updateHUD() {
            document.getElementById('progress-text').textContent = `${currentChallengeIndex} / ${challenges.length}`;
            for (let i = 1; i <= 3; i++) document.getElementById('h' + i).classList.toggle('lost', i > lives);
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => { s.classList.remove('active'); s.classList.add('hidden'); });
            const el = document.getElementById(id); if(el) { el.classList.remove('hidden'); el.classList.add('active'); }
        }

        function startGame(mode) {
            currentMode = mode; lives = 3; score = 0; fruits = []; splitFruits = [];
            initChallenges(mode); updateHUD();
            showScreen('hud'); document.getElementById('hud').style.display = 'flex';
            if (bgMusic) { bgMusic.pause(); bgMusic.currentTime = 0; }
            gameState = 'playing';
            spawnWave();
        }

        // INPUT
        function checkSlice(p1, p2) { fruits.forEach(f => { if (!f.sliced && distToSegment({x:f.x, y:f.y}, p1, p2) < f.radius * 1.3) sliceFruit(f); }); }
        function distToSegment(p, v, w) {
            const l2 = Math.pow(v.x - w.x, 2) + Math.pow(v.y - w.y, 2); if (l2 === 0) return Math.sqrt(Math.pow(p.x - v.x, 2) + Math.pow(p.y - v.y, 2));
            let t = Math.max(0, Math.min(1, ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2));
            return Math.sqrt(Math.pow(p.x - (v.x + t * (w.x - v.x)), 2) + Math.pow(p.y - (v.y + t * (w.y - v.y)), 2));
        }

        canvas.onmousedown = e => { isDrawing = true; lastPos = {x: e.clientX, y: e.clientY}; trails = [lastPos]; };
        window.onmousemove = e => { if (isDrawing && gameState === 'playing') { const cur = {x: e.clientX, y: e.clientY}; checkSlice(lastPos, cur); lastPos = cur; trails.push(cur); if (trails.length > 20) trails.shift(); } };
        window.onmouseup = () => { isDrawing = false; trails = []; };
        canvas.ontouchstart = e => { const t = e.touches[0]; isDrawing = true; lastPos = {x: t.clientX, y: t.clientY}; trails = [lastPos]; };
        canvas.ontouchmove = e => { if (isDrawing && gameState === 'playing') { const t = e.touches[0], cur = {x: t.clientX, y: t.clientY}; checkSlice(lastPos, cur); lastPos = cur; trails.push(cur); if (trails.length > 20) trails.shift(); e.preventDefault(); } };
        canvas.ontouchend = () => { isDrawing = false; trails = []; };

        document.getElementById('btn-play').onclick = () => showScreen('s-mode');
        document.getElementById('btn-back-menu').onclick = () => showScreen('s-menu');
        document.getElementById('mode-ortho').onclick = () => startGame('ortho');
        document.getElementById('mode-phone').onclick = () => startGame('phone');
        document.getElementById('btn-retry').onclick = () => startGame(currentMode);
        document.getElementById('btn-replay').onclick = () => startGame(currentMode);
        document.getElementById('btn-exit').onclick = () => { gameState='menu'; showScreen('s-menu'); document.getElementById('hud').style.display='none'; if (bgMusic) bgMusic.play(); };

        function loop() {
            ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0, 0, width, height);
            if (gameState === 'playing' || gameState === 'over' || gameState === 'win') {
                fruits.forEach((f, i) => { f.update(); f.draw(); if (f.y > height + 250 && !f.sliced) { fruits.splice(i, 1); if (f.isTarget) loseLife(); } });
                splitFruits.forEach((s, i) => { s.update(); s.draw(); if (s.alpha <= 0 || s.y > height + 250) splitFruits.splice(i, 1); });
                if (trails.length > 1) {
                    ctx.beginPath(); ctx.strokeStyle = 'rgba(255, 255, 255, 0.9)'; ctx.lineWidth = 12; ctx.lineCap = 'round';
                    trails.forEach((t, i) => { if (i === 0) ctx.moveTo(t.x, t.y); else ctx.lineTo(t.x, t.y); }); ctx.stroke();
                }
            }
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
